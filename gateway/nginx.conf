server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; frame-src 'self'; object-src 'none'; base-uri 'none'" always;

    location /assets/ {
        try_files $uri =404;
        expires 1y;
    }

    location = /workspace { return 308 /workspace/; }
    location = /jobs { return 308 /jobs/; }
    location = /projects { return 308 /projects/; }
    location = /network { return 308 /network/; }
    location = /interview { return 308 /interview/; }
    location = /profile { return 308 /profile/; }
    location = /hr-studio { return 308 /hr-studio/; }
    location = /scale { return 308 /scale/; }

    location /workspace/ { rewrite ^/workspace/(.*)$ /$1 break; proxy_pass http://workspace-service:8080; }
    location /jobs/ { rewrite ^/jobs/(.*)$ /$1 break; proxy_pass http://jobs-service:8080; }
    location /projects/ { rewrite ^/projects/(.*)$ /$1 break; proxy_pass http://projects-service:8080; }
    location /network/ { rewrite ^/network/(.*)$ /$1 break; proxy_pass http://network-service:8080; }
    location /interview/ { rewrite ^/interview/(.*)$ /$1 break; proxy_pass http://interview-service:8080; }
    location /profile/ { rewrite ^/profile/(.*)$ /$1 break; proxy_pass http://profile-service:8080; }
    location /hr-studio/ { rewrite ^/hr-studio/(.*)$ /$1 break; proxy_pass http://hr-studio-service:8080; }
    location /scale/ { rewrite ^/scale/(.*)$ /$1 break; proxy_pass http://scale-service:8080; }

    location = /healthz { access_log off; return 200 "ok\n"; }
    location = /index.html {
        try_files /index.html =404;
        expires -1;
    }
    location = / {
        try_files /index.html =404;
        expires -1;
    }
    location / { try_files $uri $uri/ /index.html; }
}
