server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'self'; object-src 'none'; base-uri 'none'" always;

    location /assets/ {
        try_files $uri =404;
        expires 1y;
    }
    location = /talent-command-center.png {
        try_files $uri =404;
        expires 30d;
    }
    location = /index.html {
        try_files /index.html =404;
        expires -1;
    }
    location / { try_files $uri $uri/ /index.html; }
    location = /healthz { access_log off; return 200 "ok\n"; }
}
