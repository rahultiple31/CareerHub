{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: api-service
  labels:
    {{- include "hiresphere.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hiresphere.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
