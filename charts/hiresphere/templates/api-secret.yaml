{{- if and .Values.api.enabled (not .Values.api.existingSecret) }}
{{- $secretName := include "hiresphere.apiSecretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $sessionSecret := randAlphaNum 48 }}
{{- if and $existingSecret (hasKey $existingSecret.data "session-secret") }}
{{- $sessionSecret = (index $existingSecret.data "session-secret" | b64dec) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "hiresphere.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  session-secret: {{ default $sessionSecret .Values.api.sessionSecret | quote }}
{{- end }}
