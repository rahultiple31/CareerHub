replicaCount: 2

image:
  repository: rahultipledocker/hiresphere-gateway
  pullPolicy: Always
  tag: "1.0"
  digest: ""

microservices:
  - name: workspace
    repository: rahultipledocker/hiresphere-workspace
    tag: "1.0"
  - name: jobs
    repository: rahultipledocker/hiresphere-jobs
    tag: "1.0"
  - name: projects
    repository: rahultipledocker/hiresphere-projects
    tag: "1.0"
  - name: network
    repository: rahultipledocker/hiresphere-network
    tag: "1.0"
  - name: interview
    repository: rahultipledocker/hiresphere-interview
    tag: "1.0"
  - name: profile
    repository: rahultipledocker/hiresphere-profile
    tag: "1.0"
  - name: hr-studio
    repository: rahultipledocker/hiresphere-hr-studio
    tag: "1.0"
  - name: scale
    repository: rahultipledocker/hiresphere-scale
    tag: "1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101

service:
  type: NodePort
  port: 80
  targetPort: 8080
  nodePort: null

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hiresphere.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

database:
  enabled: true

  auth:
    # Leave passwords empty to generate strong credentials on first install.
    # Existing generated credentials are retained during Helm upgrades.
    existingSecret: ""
    postgresDatabase: hiresphere
    postgresUsername: hiresphere
    postgresPassword: ""
    mongodbDatabase: hiresphere
    mongodbRootUsername: hiresphere_admin
    mongodbRootPassword: ""

  postgresql:
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    port: 5432
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  mongodb:
    image:
      repository: mongo
      tag: "7.0"
      pullPolicy: IfNotPresent
    port: 27017
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  service:
    type: ClusterIP

  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    postgresSize: 8Gi
    mongodbSize: 8Gi

  podSecurityContext:
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
    supplementalGroups:
      - 70

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true

  nodeSelector: {}
  tolerations: []
  affinity: {}
