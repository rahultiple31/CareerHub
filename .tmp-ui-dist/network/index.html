<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HireSphere | Network</title>
    <link rel="stylesheet" href="../shared/base.css" />
    <link rel="stylesheet" href="../shared/frame.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
<section class="view active" id="network">
          <div class="section-title">
            <div>
              <span class="eyebrow">Professional feed</span>
              <h1>Share updates, referrals, hiring signals, and project wins.</h1>
            </div>
            <button class="primary-button" id="publishPost" type="button">Publish Update</button>
          </div>

          <form class="composer" id="postComposer">
            <textarea id="postText" rows="3" placeholder="Share a hiring update, project opening, referral, or interview insight."></textarea>
            <div class="composer-actions">
              <label class="compact-select">
                Visibility
                <select id="postType">
                  <option>Hiring</option>
                  <option>Project</option>
                  <option>Referral</option>
                  <option>Interview</option>
                </select>
              </label>
              <button class="secondary-button" type="submit">Add to feed</button>
            </div>
          </form>
          <div id="feedList" class="feed-stack full-feed"></div>
        </section>
    <script type="module" src="app.js"></script>
  </body>
</html>
