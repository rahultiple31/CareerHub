<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HireSphere | HR Studio</title>
    <link rel="stylesheet" href="../shared/base.css" />
    <link rel="stylesheet" href="../shared/frame.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
<section class="view active" id="admin">
          <div class="section-title">
            <div>
              <span class="eyebrow">HR + team studio</span>
              <h1>Create jobs, shortlist candidates, post projects, assign tasks, and invite freelancers.</h1>
            </div>
          </div>

          <div class="admin-grid">
            <form class="studio-form" id="jobForm">
              <h2>Create Job</h2>
              <input name="title" placeholder="Job title" required />
              <input name="skills" placeholder="Required skills" required />
              <select name="location">
                <option>Remote</option>
                <option>Bengaluru</option>
                <option>Pune</option>
                <option>Hyderabad</option>
              </select>
              <input name="salary" type="number" placeholder="Salary LPA" required />
              <textarea name="description" placeholder="Job description"></textarea>
              <button class="primary-button" type="submit">Add Job</button>
            </form>

            <form class="studio-form" id="projectForm">
              <h2>Create Project</h2>
              <input name="title" placeholder="Project title" required />
              <input name="skills" placeholder="Skills needed" required />
              <input name="budget" type="number" placeholder="Budget USD" required />
              <input name="deadline" type="date" required />
              <textarea name="milestones" placeholder="Milestones"></textarea>
              <button class="primary-button" type="submit">Add Project</button>
            </form>

            <section class="shortlist-panel">
              <div class="panel-head">
                <h2>AI Candidate Matching</h2>
                <span class="status-pill">RBAC secured</span>
              </div>
              <div id="candidateList" class="candidate-list"></div>
            </section>
          </div>
        </section>
    <script type="module" src="app.js"></script>
  </body>
</html>
